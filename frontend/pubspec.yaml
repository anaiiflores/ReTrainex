name: retrainex
description: Aplicación de gestión de entrenamiento y rehabilitación
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Navegación
  go_router: ^17.2.1

  # HTTP (para backend)
  http: ^1.2.1

  # Estado (elige uno, puedes empezar con este)
  provider: ^6.1.2

  # Iconos
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/